
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETRAAM | Premium Fragrances</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0f0f0f; --light: #f4f4f4; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--light); color: var(--dark); transition: 0.5s; }

        /* --- LUXURY NAV --- */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 50px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 35px; letter-spacing: 8px; font-weight: 600; cursor: pointer; }
        .cart-trigger { cursor: pointer; letter-spacing: 2px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--dark); }

        /* --- HERO --- */
        header { 
            height: 80vh; background: url('https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80&w=1600') center/cover;
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(50px, 8vw, 100px); font-weight: 300; letter-spacing: 15px; margin: 0; animation: fadeIn 2s ease; }

        /* --- FILTERS --- */
        .filters { display: flex; justify-content: center; gap: 30px; padding: 60px 20px 30px; overflow-x: auto; }
        .f-btn { 
            background: none; border: none; font-size: 11px; letter-spacing: 3px; 
            text-transform: uppercase; cursor: pointer; color: #888; transition: 0.3s;
            padding-bottom: 5px; border-bottom: 2px solid transparent;
        }
        .f-btn.active { color: var(--dark); border-color: var(--gold); }

        /* --- PRODUCT GRID --- */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 2px; padding: 2px; background: #eee; /* Thin lines between cards */
        }
        .product { 
            background: white; padding: 40px; position: relative; overflow: hidden; 
            text-align: center; display: flex; flex-direction: column; align-items: center;
        }
        .product img { width: 100%; height: 400px; object-fit: cover; margin-bottom: 30px; transition: 0.8s; }
        .product:hover img { transform: scale(1.05); }
        
        .product h3 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; margin: 10px 0; }
        .product .p-cat { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
        .product .price { font-size: 16px; font-weight: 400; margin-bottom: 20px; opacity: 0.7; }
        
        .add-btn { 
            padding: 15px 40px; background: var(--dark); color: white; border: none; 
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            transition: 0.3s;
        }
        .add-btn:hover { background: var(--gold); }

        /* --- SIDE CART --- */
        .cart-sidebar { 
            position: fixed; right: -100%; top: 0; width: 400px; height: 100vh; 
            background: white; z-index: 2000; transition: 0.5s cubic-bezier(0.77,0,0.175,1);
            padding: 60px 40px; box-shadow: -20px 0 50px rgba(0,0,0,0.1);
        }
        .cart-sidebar.open { right: 0; }
        .close-cart { cursor: pointer; font-size: 30px; margin-bottom: 40px; display: inline-block; }
        .cart-items { height: 60%; overflow-y: auto; margin-bottom: 30px; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 15px 0; font-size: 13px; }

        .checkout-btn { 
            width: 100%; padding: 20px; background: #25D366; color: white; 
            border: none; font-weight: 600; letter-spacing: 2px; cursor: pointer;
        }

        /* --- FOOTER --- */
        footer { background: #000; color: white; padding: 100px 50px 50px; text-align: center; }
        .f-info { max-width: 800px; margin: 0 auto 80px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .f-col h5 { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 20px; color: var(--gold); }
        .f-col p { font-size: 12px; opacity: 0.6; letter-spacing: 1px; }

        .curated { border-top: 1px solid #222; padding-top: 50px; font-size: 11px; letter-spacing: 5px; color: #555; }
        .curated span { color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            nav { padding: 20px; }
            .cart-sidebar { width: 100%; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ETRAAM</div>
        <div class="cart-trigger" onclick="toggleCart()">SHOPPING BAG (<span id="count">0</span>)</div>
    </nav>

    <header>
        <h1>ETRAAM</h1>
    </header>

    <div class="filters">
        <button class="f-btn active" onclick="filterData('all', event)">Collection</button>
        <button class="f-btn" onclick="filterData('mens', event)">For Him</button>
        <button class="f-btn" onclick="filterData('womens', event)">For Her</button>
        <button class="f-btn" onclick="filterData('unisex', event)">Unisex</button>
        <button class="f-btn" onclick="filterData('luxury', event)">Privé</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="cart-sidebar" id="cart">
        <span class="close-cart" onclick="toggleCart()">×</span>
        <h2 style="font-family: 'Cormorant Garamond', serif; letter-spacing: 3px;">Your Bag</h2>
        <div class="cart-items" id="items"></div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 600;">
            <span>TOTAL</span>
            <span id="total">₹0</span>
        </div>
        <button class="checkout-btn" onclick="orderWA()">ORDER VIA WHATSAPP</button>
    </div>

    <footer>
        <div class="f-info">
            <div class="f-col"><h5>VISIT</h5><p>Naveen Market, Shop 42<br>Kanpur, UP</p></div>
            <div class="f-col"><h5>CONNECT</h5><p>T: +91 7054157666<br>E: contact@etraam.com</p></div>
            <div class="f-col"><h5>LEGAL</h5><p>Privacy Policy<br>Terms of Service</p></div>
        </div>
        <div class="curated">CURATED BY <span>SWASTIK SHARMA</span></div>
    </footer>

<script>
    const data = [
        { name: "Etraam Men", cat: "mens", price: 799, img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=600" },
        { name: "White Oud", cat: "mens", price: 999, img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=600" },
        { name: "Classical", cat: "mens", price: 850, img: "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=600" },
        { name: "Etraam Women", cat: "womens", price: 799, img: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=600" },
        { name: "Noor-e-Ishq", cat: "womens", price: 950, img: "https://images.unsplash.com/photo-1512781577229-c840dc339843?w=600" },
        { name: "Feminism", cat: "womens", price: 899, img: "https://images.unsplash.com/photo-1590736704728-f4730bb30770?w=600" },
        { name: "Mehfooz-e-Ishq", cat: "unisex", price: 999, img: "https://images.unsplash.com/photo-1557170334-a9632e77c6e4?w=600" },
        { name: "Etraam Adab", cat: "unisex", price: 850, img: "https://images.unsplash.com/photo-1616948055599-82090c74f115?w=600" },
        { name: "Darbaab Coll.", cat: "luxury", price: 1100, img: "https://images.unsplash.com/photo-1615485240388-14819783719e?w=600" },
        { name: "Etraam Ishq", cat: "luxury", price: 1050, img: "https://images.unsplash.com/photo-1585120040315-2241b774ad0f?w=600" }
    ];

    let cart = [];
    let grandTotal = 0;

    function render(f = 'all') {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const items = f === 'all' ? data : data.filter(d => d.cat === f);
        items.forEach(d => {
            grid.innerHTML += `
                <div class="product">
                    <span class="p-cat">${d.cat}</span>
                    <img src="${d.img}" alt="">
                    <h3>${d.name}</h3>
                    <div class="price">₹${d.price}</div>
                    <button class="add-btn" onclick="add('${d.name}', ${d.price})">Add to Bag</button>
                </div>`;
        });
    }

    function filterData(c, e) {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        render(c);
    }

    function toggleCart() { document.getElementById('cart').classList.toggle('open'); }

    function add(n, p) {
        cart.push({n, p});
        grandTotal += p;
        update();
        if(!document.getElementById('cart').classList.contains('open')) toggleCart();
    }

    function update() {
        document.getElementById('count').innerText = cart.length;
        document.getElementById('total').innerText = "₹" + grandTotal;
        const list = document.getElementById('items');
        list.innerHTML = cart.map(i => `<div class="cart-item"><span>${i.n}</span><span>₹${i.p}</span></div>`).join('');
    }

    function orderWA() {
        if(!cart.length) return;
        let t = `*ETRAAM LUXURY ORDER*%0A%0AItems:%0A${cart.map(i=>'- '+i.n).join('%0A')}%0A%0A*Total: ₹${grandTotal}*%0A%0ACurated by Swastik Sharma.`;
        window.open(`https://wa.me/917054157666?text=${t}`, '_blank');
    }

    render();
</script>
</body>
</html>
